<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | Flour & Flame</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/Contact.css">
    <link rel="stylesheet" href="Css/Main.css">
    <link rel="stylesheet" href="Css/TrackOrder.css">
</head>
<body>
    <header id="navbar">
        <a href="Main.html" class="logo">FLOUR & FLAME</a>
        <nav>
            <ul id="nav-links">
                <li><a href="Main.html">Home</a></li>
                <li><a href="Menu.html">Menu</a></li>
                <li><a href="TrackOrder.html">Track Order</a></li>
                <li><a href="Reviews.html">Reviews</a></li>
                <li><a href="Reservation.html">Reservations</a></li>
                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-wrapper track-order-wrapper">
        <section class="contact-form-section flex-section">
            <div class="booking-card">
                <h2 class="centered-heading">Track Your Order</h2>
                <p class="subtitle">Enter your Order ID below to check its current status.</p>
                
                <div class="form-group inline-flex">
                    <input type="text" id="order-id-input" placeholder="e.g. ORD-1234">
                    <button onclick="trackOrder()" class="submit-btn auto-width">Track</button>
                </div>

                <div id="track-result" class="track-result">
                    <!-- Results will be injected here -->
                </div>
            </div>
        </section>

        <section class="flex-section">
            <div id="my-active-orders-container" class="booking-card hidden">
                <h2 class="centered-heading">My Recent Orders</h2>
                <div id="active-orders-list"></div>
            </div>
        </section>
    </main>

    <script src="Jss/TrackOrder.js"></script>
    <script src="Jss/Auth.js"></script>
</body>
</html>
