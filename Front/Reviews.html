<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flour & Flame | Guest Experience</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="Css/Main.css">
    <link rel="stylesheet" href="Css/Reviews.css">
</head>

<body>

    <header id="navbar">
        <a href="Main.html" class="logo">FLOUR & FLAME</a>
        <nav>
            <ul id="nav-links">
                <li><a href="Main.html">Home</a></li>
                <li><a href="Menu.html">Menu</a></li>
                <li><a href="TrackOrder.html">Track Order</a></li>
                <li><a href="Reviews.html">Reviews</a></li>
                <li><a href="Reservation.html">Reservations</a></li>
                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="header-text">
            <p>Customer Testimonials</p>
            <h1>Guest Experience</h1>
        </div>

        <div class="reviews-grid" id="reviewsContainer">
            <!-- Reviews will be dynamically injected here -->
        </div>

        <div class="centered-box mt-80">
            <button class="btn" id="openReview">Write a Review</button>
        </div>
    </main>

    <div class="modal" id="reviewModal">
        <div class="modal-content">
            <span class="close-modal" id="closeReview">&times;</span>
            <h2 class="gold-heading mb-20">Share Your Experience</h2>
            <form id="reviewForm">
                <div class="form-group">
                    <label>Rating</label>
                    <div class="rating-input">
                        <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <label>Your Review</label>
                    <textarea rows="4" placeholder="Tell us about the food and service..." required></textarea>
                </div>
                <button type="submit" class="btn w-100">Submit Review</button>
            </form>
        </div>
    </div>

    <footer>
        <h3 class="gold-text">FLOUR & FLAME</h3>
        <p>&copy; 2026 FLOUR & FLAME</p>
    </footer>

    <script src="Jss/Reviews.js"></script>
    <script src="Jss/Auth.js"></script>
</body>

</html>
