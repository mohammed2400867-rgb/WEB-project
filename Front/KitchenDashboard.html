<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen | Flour & Flame</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/AdminDashboard.css">
    <script>
        const kitchenUserStr = localStorage.getItem('currentUser');
        const kitchenUser = kitchenUserStr ? JSON.parse(kitchenUserStr) : null;
        if (!kitchenUser || (kitchenUser.role !== 'Kitchen' && kitchenUser.role !== 'Admin' && kitchenUser.role !== 'Staff')) {
            window.location.href = 'Login.html';
        }
    </script>
    <style>
        .kanban-board {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        .kanban-col {
            flex: 1;
            min-width: 250px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .kanban-col h3 {
            color: var(--gold);
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
        }
        .kanban-card {
            background: #111;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            padding: 15px;
        }
        .kanban-card h4 {
            color: #fff;
            margin-bottom: 5px;
        }
        .kanban-card p {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }
        .kanban-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        .btn-move {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            flex: 1;
            transition: 0.3s;
        }
        .btn-move:hover {
            background: var(--gold);
            color: #000;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>FLOUR & FLAME KITCHEN</h2>
        <a href="#" class="nav-item active">Order Queue</a>
        <a href="Main.html" class="nav-item" style="margin-top: auto; border: 1px solid var(--gold);">View Website</a>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Kitchen Dashboard</h1>
            <div id="date-display" style="color: var(--gold); font-weight: 600;"></div>
        </div>

        <div class="kanban-board">
            <div class="kanban-col" id="col-pending">
                <h3>Pending</h3>
                <div class="kanban-items" id="items-pending"></div>
            </div>
            <div class="kanban-col" id="col-preparing">
                <h3>Preparing</h3>
                <div class="kanban-items" id="items-preparing"></div>
            </div>
            <div class="kanban-col" id="col-ready">
                <h3>Ready</h3>
                <div class="kanban-items" id="items-ready"></div>
            </div>
            <div class="kanban-col" id="col-delivered">
                <h3>Delivered</h3>
                <div class="kanban-items" id="items-delivered"></div>
            </div>
        </div>
    </main>

    <script src="Jss/KitchenDashboard.js"></script>
</body>
</html>
